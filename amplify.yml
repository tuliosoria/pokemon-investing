version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - |
          : > .env.production
          for key in AWS_REGION DYNAMODB_TABLE POKEDATA_API_KEY PRICECHARTING_API_TOKEN SEALED_ML_MODEL_SOURCE; do
            value="$(printenv "$key" || true)"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> .env.production
            fi
          done
    build:
      commands:
        - npm run verify:app
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
